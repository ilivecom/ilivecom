      <h1>欢迎来到hiwd</h1>
      
      <p>从2003年起，我就有了自己的独立博客。那时候搭在 WordPress 上，一用就是二十年。</p>

      <p>后来博客越来越重，插件、主题、维护……花在这些上面的时间，远超过写作本身。2023年，我决定把它推倒重来，换成你现在看到的这个样子——几乎什么都没有。</p>

      <p>我相信独立博客存在的意义，也就是我一直坚持的互联网世界的初心——开放、去中心化、自由表达。极简的形式，反而让这件事回到了它本来的样子。</p>

      <p>这里会有我的研究方向、想法，和一些生活的片段。</p>
