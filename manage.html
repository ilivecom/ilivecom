<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>控制台解锁 · hiwd</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
      --accent: #00C2B3;
      --accent-hover: #00e0cf;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      background: var(--bg-gradient);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f8fafc;
      overflow: hidden;
    }
    .blob {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(0, 194, 179, 0.15) 0%, rgba(0,0,0,0) 70%);
      border-radius: 50%;
      z-index: 1;
      animation: float 20s infinite alternate;
    }
    .blob-1 { top: -100px; left: -100px; }
    .blob-2 { bottom: -100px; right: -100px; animation-delay: -10s; }
    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 50px) scale(1.1); }
    }
    .card {
      position: relative;
      z-index: 2;
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      text-align: center;
      animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .logo-container {
      width: 72px;
      height: 72px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, var(--accent) 0%, #008F84 100%);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 800;
      color: #fff;
      box-shadow: 0 8px 16px rgba(0, 194, 179, 0.3);
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    p.subtitle {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 30px;
    }
    .input-group {
      position: relative;
      margin-bottom: 20px;
    }
    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      outline: none;
      transition: all 0.3s;
      text-align: center;
    }
    input[type="password"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 194, 179, 0.15);
      background: rgba(15, 23, 42, 0.8);
    }
    .remember-me {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 24px;
      cursor: pointer;
      user-select: none;
    }
    .remember-me input {
      accent-color: var(--accent);
      width: 16px;
      height: 16px;
      cursor: pointer;
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(0, 194, 179, 0.2);
    }
    .btn:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(0, 194, 179, 0.3);
    }
    .btn:active {
      transform: translateY(0);
    }
    .error-msg {
      color: #ef4444;
      font-size: 13px;
      margin-top: 12px;
      display: none;
      animation: shake 0.3s;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }
  </style>
</head>

  <div class="blob blob-2"></div>
  
  <div class="card" id="lock-card">
    <div class="logo-container">H</div>
    <h1>控制台解锁</h1>

    <div class="input-group">

    <label class="remember-me">

    <button class="btn" id="unlock-btn">安全解锁</button>

    const passwordInput = document.getElementById('password-input');
    const unlockBtn = document.getElementById('unlock-btn');
    const errorBox = document.getElementById('error-box');
    const rememberCheckbox = document.getElementById('remember-checkbox');
    const lockCard = document.getElementById('lock-card');
    
    function decryptAndRender(password) {
      try {
        const decryptedBytes = CryptoJS.AES.decrypt(CIPHERTEXT, password);
        const decryptedText = decryptedBytes.toString(CryptoJS.enc.Utf8);
        
        if (decryptedText && decryptedText.includes('<!DOCTYPE html>')) {
          if (rememberCheckbox.checked) {
            localStorage.setItem('hiwd_admin_pwd', password);
          } else {
            localStorage.removeItem('hiwd_admin_pwd');
          }
          
          lockCard.style.transition = 'all 0.4s ease';
          lockCard.style.opacity = '0';
          lockCard.style.transform = 'scale(0.9) translateY(-20px)';
          
          setTimeout(() => {
            document.open();
            document.write(decryptedText);
            document.close();
          }, 350);
          return true;
        }
      } catch (e) {
        // Fall through to error
      }
      
      showError();
      return false;
    }
    
    function showError() {
      errorBox.style.display = 'block';
      errorBox.style.animation = 'none';
      errorBox.offsetHeight;
      errorBox.style.animation = null;
      passwordInput.value = '';
      passwordInput.focus();
    }
    
    const savedPwd = localStorage.getItem('hiwd_admin_pwd');
    if (savedPwd) {
      lockCard.style.opacity = '0';
      const success = decryptAndRender(savedPwd);
      if (!success) {
        lockCard.style.opacity = '1';
        localStorage.removeItem('hiwd_admin_pwd');
      }
    }
    
    unlockBtn.addEventListener('click', () => {
      decryptAndRender(passwordInput.value);
    });
    
    passwordInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        decryptAndRender(passwordInput.value);
      }
      errorBox.style.display = 'none';
    });
  </script>
