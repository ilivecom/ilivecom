<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>控制台解锁 · hiwd</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <style>
    /* 全局盒模型重置 */
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    /* Logo 样式 */
    #logo {
      position: fixed;
      top: 15px;
      left: 15px;
      z-index: 9999;
      display: block;
      width: 100px;
      height: 100px;
      background-image: url('img/logo.png'); 
      background-size: cover;
      background-repeat: no-repeat;
      outline: none;
      border: none;
      -webkit-tap-highlight-color: transparent;
    }
    
    /* 解锁卡片 */
    .card {
      background-color: #fff;
      box-shadow: 0px 2px 4px rgba(0, 0, 0, 0.1);
      border-radius: 12px;
      padding: 40px 30px;
      width: 100%;
      max-width: 420px;
      animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.97) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    
    /* 标题样式 (继承主站风格，带有特有的青色粗线) */
    h1 {
      position: relative;
      padding-left: 15px;
      font-weight: bold;
      line-height: 1.2;
      color: #333;
      font-size: 28px;
      margin: 0 0 12px;
    }
    h1::before {
      content: "";
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 4px;
      height: 24px;
      background-color: #00C2B3;
      border-radius: 2px;
    }
    
    p.subtitle {
      font-size: 14px;
      color: #666;
      margin: 0 0 24px;
      line-height: 1.6;
    }
    
    .input-group {
      margin-bottom: 20px;
    }
    
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      font-size: 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-family: inherit;
      background: #fafafa;
      color: #1a1a1a;
      outline: none;
      transition: all 0.3s;
      text-align: center;
      letter-spacing: 0.1em;
    }
    input[type="password"]:focus {
      border-color: #00C2B3;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(0, 194, 179, 0.15);
    }
    
    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #666;
      margin-bottom: 24px;
      cursor: pointer;
      user-select: none;
    }
    .remember-me input {
      accent-color: #00C2B3;
      width: 16px;
      height: 16px;
      cursor: pointer;
    }
    
    /* 按钮样式 (继承主站青色与深青色悬停效果) */
    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      background: #00C2B3;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
      text-align: center;
      box-shadow: 0 2px 4px rgba(0, 194, 179, 0.2);
    }
    .btn:hover {
      background: #008F84;
      box-shadow: 0 4px 8px rgba(0, 143, 132, 0.3);
    }
    
    .error-msg {
      color: #d32f2f;
      background: #ffebee;
      border: 1px solid #ffcdd2;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      margin-top: 16px;
      display: none;
      animation: shake 0.3s;
      text-align: center;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }
    
    /* 响应式适配 */
    @media (max-width: 1150px) {
      #logo {
        position: absolute !important;
        top: 15px;
        left: 15px;
        width: 80px;
        height: 80px;
      }
    }
  </style>
</head>
<body>
  <!-- 主站标志性的 Brand Logo -->
  <a href="index.html" id="logo"></a>
  
  <div class="card" id="lock-card">
    <h1>控制台解锁</h1>
    <p class="subtitle">输入安全访问密码，解锁 hiwd 编辑后台</p>
    
    <div class="input-group">
      <input type="password" id="password-input" placeholder="输入访问密码..." autofocus>
    </div>
    
    <label class="remember-me">
      <input type="checkbox" id="remember-checkbox" checked>
      记住密码，下次自动解锁
    </label>
    
    <button class="btn" id="unlock-btn">安全解锁</button>
    <div class="error-msg" id="error-box">❌ 密码错误，请重新输入</div>
  </div>

    const passwordInput = document.getElementById('password-input');
    const unlockBtn = document.getElementById('unlock-btn');
    const errorBox = document.getElementById('error-box');
    const rememberCheckbox = document.getElementById('remember-checkbox');
    const lockCard = document.getElementById('lock-card');
    
    function decryptAndRender(password) {
      try {
        const decryptedBytes = CryptoJS.AES.decrypt(CIPHERTEXT, password);
        const decryptedText = decryptedBytes.toString(CryptoJS.enc.Utf8);
        
        if (decryptedText && decryptedText.includes('<!DOCTYPE html>')) {
          if (rememberCheckbox.checked) {
            localStorage.setItem('hiwd_admin_pwd', password);
          } else {
            localStorage.removeItem('hiwd_admin_pwd');
          }
          
          lockCard.style.transition = 'all 0.4s ease';
          lockCard.style.opacity = '0';
          lockCard.style.transform = 'scale(0.95) translateY(-20px)';
          
          setTimeout(() => {
            document.open();
            document.write(decryptedText);
            document.close();
          }, 350);
          return true;
        }
      } catch (e) {
        // Fall through to error
      }
      
      showError();
      return false;
    }
    
    function showError() {
      errorBox.style.display = 'block';
      errorBox.style.animation = 'none';
      errorBox.offsetHeight;
      errorBox.style.animation = null;
      passwordInput.value = '';
      passwordInput.focus();
    }
    
    const savedPwd = localStorage.getItem('hiwd_admin_pwd');
    if (savedPwd) {
      lockCard.style.opacity = '0';
      const success = decryptAndRender(savedPwd);
      if (!success) {
        lockCard.style.opacity = '1';
        localStorage.removeItem('hiwd_admin_pwd');
      }
    }
    
    unlockBtn.addEventListener('click', () => {
      decryptAndRender(passwordInput.value);
    });
    
    passwordInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        decryptAndRender(passwordInput.value);
      }
      errorBox.style.display = 'none';
    });
  </script>
